<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8">
<style>
  body{margin:0;background:#f0f0f0;display:flex;justify-content:center;padding:20px;font-family:Arial,Helvetica,sans-serif}
  .page{background:#fff;width:680px;padding:24px 32px;box-sizing:border-box;color:#1a1a1a}
  .page-header{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #1a1a1a;padding-bottom:10px;margin-bottom:14px}
  .header-text .title{font-size:20px;font-weight:700;margin:0 0 3px}
  .header-text .sub{font-size:12px;color:#555;font-style:italic;margin:0}
  .logo-img{height:60px;width:auto}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  .cat-header{display:flex;align-items:center;padding:4px 10px;border-radius:4px;margin-bottom:3px;margin-top:10px}
  .cat-title{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  .item-row{display:flex;justify-content:space-between;align-items:center;padding:3.5px 8px;border-bottom:.5px solid #e8e8e8;font-size:11px;gap:6px}
  .item-row:nth-child(even){background:#fafafa}
  .item-name{flex:1;color:#1a1a1a;line-height:1.3}
  .item-pts{font-weight:700;font-size:12px;white-space:nowrap;color:#534AB7}
  .col-pts-label{text-align:right;padding:0 8px 2px;font-size:9px;color:#888;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  .footer{margin-top:12px;border-top:.5px solid #ccc;padding-top:8px}
  .footer-note{font-size:10px;color:#777}
  @media print{body{background:#fff;padding:0}.page{width:100%}}
</style>

<script>
// =====================================================
//   DATOS DEL CATÁLOGO — EDITA AQUÍ
//   Cada categoría tiene: nombre, color de fondo, color de texto, y lista de productos
//   Cada producto: [ "Nombre del producto", puntos ]
//   Para ocultar un producto temporalmente: cambia true por false al final
//   Para agregar uno nuevo: copia una línea y pégala
// =====================================================

const CATALOGO = [
  {
    col: "izq",
    nombre: "Pokémon TCG",
    bg: "#FAEEDA", color: "#633806",
    items: [
      ["WCS Deck Miraidon ex (Inglés)", 100, true],
      ["WCS Deck Regidrago VStar (Inglés)", 100, true],
      ["WCS Deck Roaring Moon (Inglés)", 100, true],
      ["POK Walking Wake Playmat 2024", 100, true],
      ["Phantasmal Flames Booster (ESP)", 25, true],
      ["Chaos Rising Booster (ENG)", 25, true],
      ["Mega Lucario ex Battle Deck (ENG)", 25, true],
      ["Perfect Order Booster (PT-BR)", 15, true],
    ]
  },
  {
    col: "izq",
    nombre: "Star Wars Unlimited",
    bg: "#E6F1FB", color: "#0C447C",
    items: [
      ["Spotlight Deck Jabba (Inglés)", 130, true],
      ["Spotlight Deck Leia (Inglés)", 130, true],
      ["Spotlight Deck Darth Maul (ESP)", 120, true],

    bg: "#E1F5EE", color: "#085041",
    items: [
      ["TopDeck Carpeta 480 (White)", 80, true],
      ["GG BGG Sleeves Prime Pack 100", 50, true],
      ["Portaplaymat Hexagonal", 40, true],
    ]
  },
  {
    col: "der",
    nombre: "Snacks y bebestibles",
    bg: "#FAECE7", color: "#712B13",

      ["Energizante Score 500ml", 10, true],
      ["Score Gorila / Mango / Fruit Punch / Gorila Zero / Radical White", 10, true],

      ["Italian Brainrot TCG Expositor", 15, true],
      ["Naipe Poker Inglés", 5, true],
      ["Ajedrez madera", 20, true],
      ["Ajedrez", 10, true],
    ]
  },
];

// =====================================================
//   FIN DE LA SECCIÓN DE DATOS — no editar más abajo
// =====================================================

function buildCatalog() {
  const colIzq = document.getElementById("col-izq");
  const colDer = document.getElementById("col-der");

  CATALOGO.forEach(cat => {
    const activeItems = cat.items.filter(i => i[2]);
    if (activeItems.length === 0) return;

    const block = document.createElement("div");

    const header = document.createElement("div");
    header.className = "cat-header";
    header.style.background = cat.bg;
    header.innerHTML = `<span class="cat-title" style="color:${cat.color}">${cat.nombre}</span>`;
    block.appendChild(header);

    const label = document.createElement("div");
    label.className = "col-pts-label";
    label.textContent = "PUNTOS";
    block.appendChild(label);

    activeItems.forEach((item, idx) => {
      const row = document.createElement("div");
      row.className = "item-row";
      if (idx % 2 !== 0) row.style.background = "#fafafa";
      row.innerHTML = `<span class="item-name">${item[0]}</span><span class="item-pts">${item[1]}</span>`;
      block.appendChild(row);
    });

    (cat.col === "izq" ? colIzq : colDer).appendChild(block);
  });
}

window.onload = buildCatalog;
</script>
